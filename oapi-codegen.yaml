# oapi-codegen configuration for github.com/codeownersnet/opencode-go-sdk
#
# The generator produces a single opencode.gen.go containing both types and
# client. The committed opencode-spec.json is the source of truth; embedded-spec
# is disabled to keep the output small.
package: opencode

generate:
  models: true
  client: true
  embedded-spec: false
